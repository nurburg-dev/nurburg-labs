name: Validate Contents

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/admin/contents
        run: |
          curl -X POST https://nurburg.dev/api/admin/contents \
            -H "Authorization: Bearer ${{ secrets.ADMIN_SECRET }}" \
            -H "Content-Type: application/json" \
            -d '{"repo": "nurburg-dev/nurburg-labs", "dryRun": true}'
