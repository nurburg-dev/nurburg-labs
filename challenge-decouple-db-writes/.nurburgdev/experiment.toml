description = "Decouple DB writes from the request path using Kafka as an intermediate buffer."

[[service]]
name = "app"
runtime = "nodejs"
port = 3000
healthCheckUrl = "/healthcheck"
cpuCores = 0.5
memoryMB = 512
instances = 1
directory = "challenge-decouple-db-writes"

[service.env]
DATABASE_URL = "postgresql://user:password@postgres:5432/appdb"
KAFKA_BROKERS = "kafka:9092"

[[postgres]]
name = "postgres"
cpuCores = 0.5
memoryMB = 512
storageGB = 5
dbName = "appdb"
user = "user"
password = "password"

[[kafka]]
name = "kafka"
cpuCores = 0.5
memoryMB = 512
storageGB = 5
brokers = 1

[[kafka.topics]]
name = "db-writes"
partition = 3
replicationFactor = 1

[[traffic]]
file = "challenge-decouple-db-writes/.nurburgdev/traffic.js"
cpuCores = 0.5
memoryMB = 256

[traffic.env]
TARGET_URL = "http://app:3000"

apitest = ["challenge-decouple-db-writes/.nurburgdev/apitest.tavern.yaml"]

[[score]]
name = "ERR_RATE"
taskName = "traffic"
threshold = 5.0

[[score]]
name = "LATENCY_95"
taskName = "traffic"
threshold = 200.0

[[score]]
name = "FUNC_TEST"
taskName = "apitest-0"
threshold = 100.0
