test_name: "Booking service healthcheck"
stages:
  - name: "GET /healthcheck returns 200"
    request:
      url: "{tavern.env_vars.HOST_BOOKING_SERVICE}/healthcheck"
      method: GET
    response:
      status_code: 200
---
test_name: "Airline-1 service healthcheck"
stages:
  - name: "GET /healthcheck returns 200"
    request:
      url: "{tavern.env_vars.HOST_AIRLINES_1}/healthcheck"
      method: GET
    response:
      status_code: 200
---
test_name: "Airline-2 service healthcheck"
stages:
  - name: "GET /healthcheck returns 200"
    request:
      url: "{tavern.env_vars.HOST_AIRLINES_2}/healthcheck"
      method: GET
    response:
      status_code: 200
