  - name: "Wait for sagas to complete then fetch booking-service confirmed count"
    delay_before: 10
    request:
      url: "{tavern.env_vars.HOST_BOOKING_SERVICE}/bookings/confirmed-count"
      method: GET
    response:
      status_code: 200
      save:
        json:
          confirmed_count: count

  - name: "airline-1 confirmed count matches booking-service"
    request:
      url: "{tavern.env_vars.HOST_AIRLINES_1}/flight-bookings/confirmed-count"
      method: GET
    response:
      status_code: 200
      json:
        count: !int "{confirmed_count}"

  - name: "airline-2 confirmed count matches booking-service"
    request:
      url: "{tavern.env_vars.HOST_AIRLINES_2}/flight-bookings/confirmed-count"
      method: GET
    response:
      status_code: 200
      json:
        count: !int "{confirmed_count}"

  - name: "airline-1 has no blocked flight bookings"
    request:
      url: "{tavern.env_vars.HOST_AIRLINES_1}/flight-bookings/blocked-count"
      method: GET
    response:
      status_code: 200
      json:
        count: 0

  - name: "airline-2 has no blocked flight bookings"
    request:
      url: "{tavern.env_vars.HOST_AIRLINES_2}/flight-bookings/blocked-count"
      method: GET
    response:
