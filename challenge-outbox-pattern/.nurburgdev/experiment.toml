description = "Implement the transactional outbox pattern to reliably publish events to Kafka after a database write."

[[service]]
name = "app"
runtime = "nodejs"
port = 3000
healthCheckUrl = "/healthcheck"
cpuCores = 0.5
memoryMB = 512
instances = 1
directory = "challenge-outbox-pattern"
env = { DATABASE_URL = "postgresql://user:password@postgres:5432/appdb", KAFKA_BROKERS = "kafka:9092"}

[[postgres]]
name = "postgres"
cpuCores = 0.5
memoryMB = 512
storageGB = 5
dbName = "appdb"
user = "user"
password = "password"

[[kafka]]
name = "kafka"
cpuCores = 0.5
memoryMB = 512
storageGB = 5
brokers = 1
topics = [{name = "outbox-events", partition = 3, replicationFactor = 1}]

[[traffic]]
file = ".nurburgdev/traffic.js"
cpuCores = 0.5
memoryMB = 256
env = {HOST = "http://app:3000"}

[[score]]
name = "ERR_RATE"
taskName = "traffic"
threshold = 0.1

[[score]]
name = "LATENCY_95"
taskName = "traffic"
threshold = 200.0

[[score]]
name = "FUNC_TEST"
taskName = "apitest-0"
threshold = 100.0
